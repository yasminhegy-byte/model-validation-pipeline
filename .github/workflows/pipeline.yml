name: Model Validation and Deployment Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  MLFLOW_TRACKING_URI: file:./mlruns
  MLFLOW_EXPERIMENT_NAME: classifier-training

jobs:
  validate:
    name: Validate Model
    runs-on: ubuntu-latest
    outputs:
      model_run_id: ${{ steps.export_model_info.outputs.run_id }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install dvc[gs] mlflow scikit-learn numpy pandas joblib

      - name: Configure DVC
        run: |
          dvc config core.autostage true
          echo "DVC configured"

      - name: Pull data with DVC
        run: |
          echo "Simulating DVC pull (no remote configured)"
          dvc pull || echo "DVC pull skipped - no remote configured"
          # Data will be generated by train.py if not present

      - name: Train model
        id: train
        env:
          MLFLOW_TRACKING_URI: ${{ env.MLFLOW_TRACKING_URI }}
          TRAIN_SEED: 99
        run: |
          python train.py
          echo "Training completed"

      - name: Export model info
        id: export_model_info
        env:
          MLFLOW_TRACKING_URI: ${{ env.MLFLOW_TRACKING_URI }}
        run: |
          # Check if model_info.txt was created by train.py
          if [ -f model_info.txt ]; then
            RUN_ID=$(cat model_info.txt)
            echo "Found Run ID: $RUN_ID"
            echo "run_id=$RUN_ID" >> $GITHUB_OUTPUT
          else
            echo "ERROR: model_info.txt not found"
            exit 1
          fi

      - name: Upload model info artifact
        uses: actions/upload-artifact@v4
        with:
          name: model-info
          path: model_info.txt
          retention-days: 7

      - name: Upload MLflow runs
        uses: actions/upload-artifact@v4
        with:
          name: mlruns
          path: mlruns/
          retention-days: 7

  deploy:
    name: Deploy Model
    runs-on: ubuntu-latest
    needs: validate
    if: success()
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow scikit-learn

      - name: Download model info artifact
        uses: actions/download-artifact@v4
        with:
          name: model-info

      - name: Download MLflow runs
        uses: actions/download-artifact@v4
        with:
          name: mlruns
          path: mlruns/

      - name: Check performance threshold
        id: check_threshold
        env:
          MLFLOW_TRACKING_URI: file:./mlruns
        run: |
          python check_threshold.py
          echo "Threshold check passed"

      - name: Build Docker image (Mock)
        run: |
          RUN_ID=$(cat model_info.txt)
          echo "Building Docker image for Run ID: $RUN_ID"
          docker build -t model-classifier:$RUN_ID --build-arg RUN_ID=$RUN_ID .
          echo "Mock Docker build completed for Run ID: $RUN_ID"

      - name: Deployment Summary
        run: |
          RUN_ID=$(cat model_info.txt)
          echo "✅ Deployment successful!"
          echo "Model Run ID: $RUN_ID"
          echo "Docker image: model-classifier:$RUN_ID"
